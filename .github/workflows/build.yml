name: Rebuild map
on:
  push:
    paths: ["gpx/**", "scripts/**"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python scripts/build.py
      - name: Commit data.json
        run: |
          git config user.name "map-bot"
          git config user.email "actions@github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "Rebuild map data"
          git push
