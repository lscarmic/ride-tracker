<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lee's Ride</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#map{position:absolute;inset:0}
#panel{position:absolute;top:12px;right:12px;z-index:1000;background:rgba(255,255,255,.95);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.25);padding:14px 16px;min-width:230px;max-width:300px;max-height:calc(100% - 48px);overflow:auto}
#panel h1{font-size:16px;margin:0 0 2px}
#panel .sub{font-size:11px;color:#666;margin-bottom:10px}
.leg{display:flex;align-items:center;gap:8px;padding:6px 4px;border-radius:8px;cursor:pointer;user-select:none}
.leg:hover{background:#f0f0f0}
.leg .swatch{width:14px;height:14px;border-radius:4px;flex:none}
.leg .nm{font-size:13px;font-weight:600}
.leg .mi{margin-left:auto;font-size:12px;color:#444;font-variant-numeric:tabular-nums;padding-left:10px}
.leg.off{opacity:.35}
#total{border-top:1px solid #ddd;margin-top:8px;padding-top:8px;font-size:13px;display:flex;justify-content:space-between}
#updated{font-size:10px;color:#999;margin-top:6px;text-align:right}
@media (max-width:600px){#panel{left:12px;right:12px;max-width:none;top:auto;bottom:12px;max-height:45%}}
</style></head><body>
<div id="map"></div>
<div id="panel">
<h1 id="title">Lee's Ride</h1><div class="sub">Tap a leg to show/hide · click a line for details</div>
<div id="legs"></div>
<div id="total"><span>Total</span><strong id="totmi"></strong></div>
<div id="updated"></div>
</div>
<script>
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap contributors',maxZoom:19}).addTo(map);
const group=L.featureGroup().addTo(map);
fetch('data.json?t='+Date.now()).then(r=>r.json()).then(D=>{
  const legDiv=document.getElementById('legs');
  D.legs.forEach(leg=>{
    const line=L.polyline(leg.pts,{color:leg.color,weight:4,opacity:.9});
    line.bindPopup(`<b>${leg.name}</b><br>${leg.miles.toLocaleString()} miles`);
    line.addTo(group);
    const mk=p=>L.circleMarker(p,{radius:5,color:'#fff',weight:2,fillColor:leg.color,fillOpacity:1});
    const m1=mk(leg.pts[0]).addTo(group), m2=mk(leg.pts[leg.pts.length-1]).addTo(group);
    const row=document.createElement('div');
    row.className='leg';
    row.innerHTML=`<div class="swatch" style="background:${leg.color}"></div><div class="nm">${leg.name}</div><div class="mi">${leg.miles.toLocaleString()} mi</div>`;
    let on=true;
    row.onclick=()=>{on=!on;row.classList.toggle('off',!on);[line,m1,m2].forEach(x=>on?x.addTo(group):group.removeLayer(x));};
    legDiv.appendChild(row);
  });
  document.getElementById('totmi').textContent=D.legs.reduce((s,l)=>s+l.miles,0).toLocaleString(undefined,{maximumFractionDigits:0})+' mi';
  document.getElementById('updated').textContent='Updated '+D.updated;
  if(D.legs.length) map.fitBounds(group.getBounds().pad(0.06));
});
</script></body></html>
